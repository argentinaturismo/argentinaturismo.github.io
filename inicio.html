<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Argentina Turismo — Bienvenido</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:   #0f1117;
      --gold:  #e8c96a;
      --cream: #f4ecd8;
      --line:  rgba(232,201,106,0.4);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; }
    body {
      font-family:'Barlow', sans-serif;
      background:var(--ink);
      overflow:hidden;
    }

    /* ── SLIDESHOW ── */
    .slideshow { position:fixed; inset:0; z-index:0; }
    .slide {
      position:absolute; inset:0;
      background-size:cover; background-position:center;
      opacity:0;
      animation: slideshow 20s infinite;
      transform:scale(1);
    }
    .slide span {
      position:absolute; inset:0; display:block;
      background-size:cover; background-position:center;
      animation: kenburns 20s infinite;
    }
    .slide:nth-child(1) { animation-delay:0s;  }
    .slide:nth-child(2) { animation-delay:4s;  }
    .slide:nth-child(3) { animation-delay:8s;  }
    .slide:nth-child(4) { animation-delay:12s; }
    .slide:nth-child(5) { animation-delay:16s; }
    .slide:nth-child(1) span { animation-delay:0s;  }
    .slide:nth-child(2) span { animation-delay:4s;  }
    .slide:nth-child(3) span { animation-delay:8s;  }
    .slide:nth-child(4) span { animation-delay:12s; }
    .slide:nth-child(5) span { animation-delay:16s; }

    @keyframes slideshow {
      0%    { opacity:0; }
      2%    { opacity:1; }
      20%   { opacity:1; }
      24%   { opacity:0; }
      100%  { opacity:0; }
    }
    @keyframes kenburns {
      0%   { transform:scale(1);    }
      20%  { transform:scale(1.08); }
      24%  { transform:scale(1.1);  }
      100% { transform:scale(1.1);  }
    }

    /* ── OVERLAY ── */
    .overlay {
      position:fixed; inset:0; z-index:1; pointer-events:none;
      background:
        linear-gradient(180deg, rgba(15,17,23,0.55) 0%, rgba(15,17,23,0.15) 38%, rgba(15,17,23,0.25) 60%, rgba(15,17,23,0.85) 100%);
    }
    .overlay::after {
      content:''; position:absolute; inset:0;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(15,17,23,0.55) 100%);
    }

    /* ── CONTENT ── */
    .content {
      position:relative; z-index:2;
      height:100vh; width:100%;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      text-align:center; padding:0 24px;
    }

    /* signature sun mark */
    .sun {
      width:54px; height:54px; margin-bottom:22px;
      opacity:0.92;
    }
    .sun circle { fill:none; stroke:var(--gold); stroke-width:1.4; }
    .sun line   { stroke:var(--gold); stroke-width:1.4; stroke-linecap:round; }

    .eyebrow {
      font-family:'Barlow', sans-serif;
      font-weight:600;
      font-size:0.7rem;
      letter-spacing:0.42em;
      text-transform:uppercase;
      color:var(--gold);
      margin-bottom:18px;
      opacity:0.9;
    }

    .title-main {
      font-family:'Playfair Display', serif;
      font-weight:900;
      font-size:clamp(2.8rem, 11vw, 7.2rem);
      letter-spacing:0.1em;
      color:var(--cream);
      text-transform:uppercase;
      line-height:1;
      text-shadow:0 2px 30px rgba(0,0,0,0.35);
    }

    .rule {
      width:min(70vw, 360px);
      height:1px;
      background:linear-gradient(90deg, transparent, var(--line) 50%, transparent);
      margin:18px auto;
    }

    .title-sub {
      font-family:'Playfair Display', serif;
      font-style:italic;
      font-weight:400;
      font-size:clamp(1.6rem, 5.5vw, 3.1rem);
      letter-spacing:0.22em;
      color:var(--gold);
      text-transform:uppercase;
      line-height:1.2;
    }

    .welcome {
      font-family:'Barlow', sans-serif;
      font-weight:300;
      font-size:clamp(0.95rem, 2.2vw, 1.25rem);
      letter-spacing:0.32em;
      text-transform:uppercase;
      color:var(--cream);
      opacity:0.82;
      margin-top:32px;
    }

    .btn-enter {
      display:inline-block;
      margin-top:42px;
      padding:16px 56px;
      border:1.5px solid var(--gold);
      border-radius:2px;
      color:var(--gold);
      background:transparent;
      font-family:'Barlow', sans-serif;
      font-weight:600;
      font-size:0.85rem;
      letter-spacing:0.3em;
      text-transform:uppercase;
      text-decoration:none;
      cursor:pointer;
      transition:background .35s ease, color .35s ease, letter-spacing .35s ease;
    }
    .btn-enter:hover {
      background:var(--gold);
      color:var(--ink);
      letter-spacing:0.38em;
    }
    .btn-enter:focus-visible {
      outline:2px solid var(--gold);
      outline-offset:4px;
    }

    /* ── PROVINCE CAPTION ── */
    .caption {
      position:absolute; bottom:28px; right:34px; z-index:2;
      font-family:'Barlow', sans-serif;
      font-size:0.68rem; letter-spacing:0.2em; text-transform:uppercase;
      color:var(--cream); opacity:0.55;
    }

    @media (prefers-reduced-motion: reduce) {
      .slide, .slide span { animation:none; }
      .slide:nth-child(1) { opacity:1; }
      .slide:nth-child(1) span { transform:scale(1); }
    }

    @media (max-width:480px) {
      .title-sub { letter-spacing:0.14em; }
      .welcome   { letter-spacing:0.2em; }
      .btn-enter { padding:14px 40px; }
    }
  </style>
</head>
<body>

  <!-- SLIDESHOW -->
  <div class="slideshow">
    <div class="slide"><span style="background-image:url('https://commons.wikimedia.org/wiki/Special:FilePath/Cataratas_Iguazu_vista_general.JPG?width=1920')"></span></div>
    <div class="slide"><span style="background-image:url('https://commons.wikimedia.org/wiki/Special:FilePath/Glaciar_Perito_Moreno26_-_Argentina.JPG?width=1920')"></span></div>
    <div class="slide"><span style="background-image:url('https://commons.wikimedia.org/wiki/Special:FilePath/Jujuy-Purmamarca-P3120100.JPG?width=1920')"></span></div>
    <div class="slide"><span style="background-image:url('https://commons.wikimedia.org/wiki/Special:FilePath/Bariloche-_Argentina.jpg?width=1920')"></span></div>
    <div class="slide"><span style="background-image:url('https://commons.wikimedia.org/wiki/Special:FilePath/Obelisco_en_Buenos_Aires.JPG?width=1920')"></span></div>
  </div>

  <div class="overlay"></div>

  <!-- CONTENT -->
  <div class="content">

    <svg class="sun" viewBox="0 0 54 54" xmlns="http://www.w3.org/2000/svg">
      <circle cx="27" cy="27" r="10"/>
      <line x1="27" y1="2"  x2="27" y2="11"/>
      <line x1="27" y1="43" x2="27" y2="52"/>
      <line x1="2"  y1="27" x2="11" y2="27"/>
      <line x1="43" y1="27" x2="52" y2="27"/>
      <line x1="9.5"  y1="9.5"  x2="16" y2="16"/>
      <line x1="38" y1="38" x2="44.5" y2="44.5"/>
      <line x1="44.5" y1="9.5" x2="38" y2="16"/>
      <line x1="16" y1="38" x2="9.5" y2="44.5"/>
    </svg>

    <div class="eyebrow">República Argentina</div>

    <h1 class="title-main">Argentina</h1>
    <div class="rule"></div>
    <div class="title-sub">Turismo</div>

    <p class="welcome">Bienvenido</p>

    <a class="btn-enter" href="mapa.html">Entrar</a>

  </div>

  <div class="caption" id="caption">Misiones · Cataratas del Iguazú</div>

  <script>
    // Sync the bottom-right caption with the visible slide
    const captions = [
      'Misiones · Cataratas del Iguazú',
      'Santa Cruz · Glaciar Perito Moreno',
      'Jujuy · Cerro de los Siete Colores',
      'Río Negro · Bariloche',
      'Buenos Aires · El Obelisco'
    ];
    const el = document.getElementById('caption');
    let i = 0;
    setInterval(() => {
      i = (i + 1) % captions.length;
      el.style.opacity = 0;
      setTimeout(() => { el.textContent = captions[i]; el.style.opacity = 0.55; }, 250);
    }, 4000);
    el.style.transition = 'opacity .3s ease';
  </script>

</body>
</html>
